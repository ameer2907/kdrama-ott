services:
  - type: web
    name: kdramaverse-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: TMDB_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ADMIN_EMAIL
        value: ameermalikbahad07@gmail.com
